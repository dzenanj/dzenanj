 <nav>

<section class="page-hero page-hero-compact">
  <div class="container">
    <p class="section-label">Photography</p>
    <h1>Selected Work</h1>
    <p class="page-text">Automotive imagery centered on detail, atmosphere, and visual presence.</p>

    <div class="page-meta">
      <span>Automotive</span>
      <span>Editorial</span>
      <span>Creative & Commercial</span>
    </div>
  </div>
</section>
  
  <main class="page-main">
<section class="section">
  <div class="container gallery">
    <div class="gallery-item hero-strip lightbox-trigger" data-image="images/photo1.jpg" style="background-image: url('images/photo1.jpg');"></div>
    <div class="gallery-item hero-strip lightbox-trigger" data-image="images/photo2.jpg" style="background-image: url('images/photo2.jpg');"></div>

    <div class="gallery-item medium-left lightbox-trigger" data-image="images/photo3.jpg" style="background-image: url('images/photo3.jpg');"></div>
    <div class="gallery-item medium-right lightbox-trigger" data-image="images/photo4.jpg" style="background-image: url('images/photo4.jpg');"></div>
    <div class="gallery-item small-left lightbox-trigger" data-image="images/photo5.jpg" style="background-image: url('images/photo5.jpg');"></div>
    <div class="gallery-item small-center lightbox-trigger" data-image="images/photo6.jpg" style="background-image: url('images/photo6.jpg');"></div>
    <div class="gallery-item small-right lightbox-trigger" data-image="images/photo7.jpg" style="background-image: url('images/photo7.jpg');"></div>
  </div>
</section>

<div class="lightbox" id="lightbox">
  <button class="lightbox-arrow lightbox-arrow-left" id="lightbox-prev" aria-label="Previous image">‹</button>
  <div class="lightbox-display" id="lightbox-image"></div>
  <button class="lightbox-arrow lightbox-arrow-right" id="lightbox-next" aria-label="Next image">›</button>
  <button class="lightbox-close" id="lightbox-close" aria-label="Close image">×</button>
</div>
